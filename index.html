<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Student Survey</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Clean Input Screen -->
    <div id="form-screen" class="screen">
      <h2>Student Profile</h2>
      <p class="subtitle">Please complete your details down below.</p>
      
      <form id="survey-form">
        <!-- Gender Select -->
        <div class="input-group">
          <label>Select Gender</label>
          <div class="gender-options">
            <button type="button" class="gender-btn" data-gender="Male">Male</button>
            <button type="button" class="gender-btn" data-gender="Female">Female</button>
          </div>
        </div>

        <!-- Department Input Dropdown -->
        <div class="input-group">
     <select id="department" required>
  <option value="" disabled selected>-- Choose your Department --</option>
  <optgroup label="College of Engineering">
    <option value="Architecture">Architecture</option>
    <option value="Civil Engineering">Civil Engineering</option>
    <option value="Mining Engineering">Mining Engineering</option>
    <option value="Chemical Engineering">Chemical Engineering</option>
    <option value="Environmental Engineering">Environmental Engineering</option>
    <option value="Electrical and Computer Engineering">Electrical and Computer Engineering</option>
    <option value="Electromechanical Engineering">Electromechanical Engineering</option>
    <option value="Mechanical Engineering">Mechanical Engineering</option>
    <option value="Software Engineering">Software Engineering</option>
  </optgroup>
  <optgroup label="College of Natural and Applied Sciences">
    <option value="Food Science and Applied Nutrition">Food Science and Applied Nutrition</option>
    <option value="Geology">Geology</option>
    <option value="Biotechnology">Biotechnology</option>
    <option value="Industrial Chemistry">Industrial Chemistry</option>
  </optgroup>
</select>
        </div>

        <!-- CGPA Input -->
        <div class="input-group">
          <label for="cgpa">CGPA (1.00 - 4.00)</label>
          <input type="number" id="cgpa" step="0.01" min="1" max="4" placeholder="e.g. 3.75" required>
        </div>

        <button type="submit" id="submit-btn" disabled>Submit Form</button>
      </form>
    </div>

    <!-- Success Feedback Overlay -->
    <div id="success-screen" class="screen hidden">
      <div class="icon success">✓</div>
      <h2>Thank You!</h2>
      <p>Your responses have been securely logged to the Google Sheet.</p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
